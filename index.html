<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Pose + OCR Web Client</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; }
        #container { position: relative; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        video { display: none; }
        canvas { border: 2px solid #444; background: #000; max-width: 100%; height: auto; }
        #status { margin-top: 10px; font-weight: bold; padding: 5px 15px; border-radius: 20px; background: #333; }
        .controls { margin-top: 20px; text-align: center; color: #ccc; }
    </style>
</head>
<body>
    <h1>YOLO Pose + OCR 실시간 분석</h1>
    <div id="status">카메라 권한 확인 중...</div>
    
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <p>서버에서 실시간으로 포즈와 텍스트(OCR)를 추출합니다.</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        let socket = null;
        let isProcessing = false;
        let lastResults = [];

        // COCO 키포인트 연결 쌍 (뼈대 그리기용)
        const SKELETON = [
            [16, 14], [14, 12], [17, 15], [15, 13], [12, 13], [6, 12],
            [7, 13], [6, 7], [6, 8], [7, 9], [8, 10], [9, 11], [2, 3],
            [1, 2], [1, 3], [2, 4], [3, 5], [4, 6], [5, 7]
        ];

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startWebSocket();
                    renderLoop(); // 상시 렌더링 루프 시작
                };
            } catch (err) {
                console.error("Camera error:", err);
                statusDiv.innerText = "카메라를 열 수 없습니다: " + err.message;
            }
        }

        function startWebSocket() {
            const serverIP = window.location.hostname || "localhost";
            socket = new WebSocket(`ws://${serverIP}:8000/ws`);

            socket.onopen = () => {
                statusDiv.innerText = "서버 연결됨";
                statusDiv.style.color = "#00ff00";
                sendFrame(); // 프레임 전송 시작
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                lastResults = data.results;
                isProcessing = false;
                // 다음 프레임 전송 (약간의 지연을 주어 과부하 방지 가능)
                setTimeout(sendFrame, 10);
            };

            socket.onclose = () => {
                statusDiv.innerText = "연결 끊김. 재시도 중...";
                statusDiv.style.color = "#ff4444";
                setTimeout(startWebSocket, 2000);
            };
        }

        function sendFrame() {
            if (!socket || socket.readyState !== WebSocket.OPEN || isProcessing) return;

            isProcessing = true;
            // 현재 프레임을 캡처하기 위한 임시 캔버스 사용 가능하지만, 
            // 여기선 현재 화면에 보이는 canvas의 내용을 그대로 사용
            // 품질을 0.6에서 0.85로 높여 YOLO 검출 정확도 향상
            const imageData = canvas.toDataURL('image/jpeg', 0.85);
            socket.send(imageData);
        }

        // 상시 실행되는 렌더링 루프 (영상 + 결과물)
        function renderLoop() {
            // 1. 비디오 그리기
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 2. 서버에서 받은 마지막 결과 그리기
            drawResults(lastResults);
            
            requestAnimationFrame(renderLoop);
        }

        function drawResults(results) {
            results.forEach(person => {
                const box = person.box;
                const tid = person.id;
                const ocr = person.ocr;
                const kpts = person.keypoints;

                // 1. 바운딩 박스
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(box[0], box[1], box[2] - box[0], box[3] - box[1]);

                // 2. OCR 및 ID 정보 표시
                const label = ocr ? `${ocr} (ID:${tid})` : `ID:${tid}`;
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 16px Arial';
                const textWidth = ctx.measureText(label).width;
                ctx.fillRect(box[0], box[1] - 25, textWidth + 10, 25);
                ctx.fillStyle = 'black';
                ctx.fillText(label, box[0] + 5, box[1] - 7);

                // 3. 뼈대 그리기
                if (kpts && kpts.length > 0) {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                    SKELETON.forEach(([p1, p2]) => {
                        const kp1 = kpts[p1 - 1];
                        const kp2 = kpts[p2 - 1];
                        if (kp1[2] > 0.4 && kp2[2] > 0.4) {
                            ctx.beginPath();
                            ctx.moveTo(kp1[0], kp1[1]);
                            ctx.lineTo(kp2[0], kp2[1]);
                            ctx.stroke();
                        }
                    });

                    // 4. 키포인트 점 그리기
                    kpts.forEach((kpt, idx) => {
                        const [x, y, conf] = kpt;
                        if (conf > 0.4) {
                            ctx.beginPath();
                            ctx.arc(x, y, 4, 0, 2 * Math.PI);
                            ctx.fillStyle = idx < 5 ? '#ff0000' : '#ffff00'; // 얼굴 쪽은 빨간색
                            ctx.fill();
                        }
                    });
                }
            });
        }

        startCamera();
    </script>
</body>
</html>
